<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="作戦盤">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>バスケ作戦盤</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700&display=swap');

  :root {
    --accent: #f5a623;
    --accent2: #e84040;
    --btn-bg: #1e1e1e;
    --btn-border: #333;
    --text: #f0f0f0;
    --team-a: #3b82f6;
    --team-b: #ef4444;
    --ball-color: #f97316;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a0a;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--text);
    touch-action: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    height: -webkit-fill-available;
  }

  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: #111;
    border-bottom: 1px solid #222;
    flex-shrink: 0;
    min-height: 48px;
  }
  #header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .header-btns { display: flex; gap: 8px; }
  .hbtn {
    background: var(--btn-bg); border: 1px solid var(--btn-border);
    color: var(--text); font-size: 11px; padding: 6px 10px;
    border-radius: 6px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; white-space: nowrap;
    transition: background 0.15s;
  }
  .hbtn:active { background: #2a2a2a; }
  .hbtn.danger { border-color: var(--accent2); color: var(--accent2); }

  #court-wrap {
    flex: 1; position: relative; overflow: hidden;
    background: #0a0a0a; min-height: 0;
  }
  #court-canvas {
    position: absolute; top: 0; left: 0; touch-action: none;
  }

  #toolbar {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 8px; background: #111;
    border-top: 1px solid #222;
    overflow-x: auto; flex-shrink: 0; scrollbar-width: none;
  }
  #toolbar::-webkit-scrollbar { display: none; }

  .tool-section { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
  .tool-divider { width: 1px; height: 28px; background: #333; flex-shrink: 0; }

  .tbtn {
    width: 42px; height: 34px;
    background: var(--btn-bg); border: 1px solid var(--btn-border);
    border-radius: 7px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all 0.15s; flex-shrink: 0; position: relative;
  }
  .tbtn span.label {
    position: absolute; bottom: 2px;
    font-size: 7px; color: #777; font-family: 'Noto Sans JP', sans-serif;
  }
  .tbtn:active { background: #2a2a2a; transform: scale(0.93); }
  .tbtn.active { background: #1a2a3a; border-color: var(--accent); box-shadow: 0 0 8px rgba(245,166,35,0.3); }
  .tbtn.team-a { border-color: var(--team-a); }
  .tbtn.team-b { border-color: var(--team-b); }
  .tbtn.ball-btn { border-color: var(--ball-color); }

  .marker-preview {
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    font-family: 'Bebas Neue', sans-serif; color: #fff;
  }

  #arrow-options {
    display: flex; align-items: center; gap: 6px;
    padding: 0 8px 6px; background: #111; flex-shrink: 0;
    overflow-x: auto; scrollbar-width: none;
  }
  #arrow-options::-webkit-scrollbar { display: none; }
  .color-dot {
    width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: border-color 0.15s; flex-shrink: 0;
  }
  .color-dot.selected { border-color: #fff; }
  .arrow-label { font-size: 10px; color: #777; white-space: nowrap; flex-shrink: 0; }
  .width-btn {
    background: #333; border-radius: 3px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #ccc; font-size: 9px; flex-shrink: 0;
    border: 2px solid transparent; transition: border-color 0.15s;
  }
  .width-btn.selected { border-color: var(--accent); }

  #toast {
    position: absolute; bottom: 16px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(20,20,20,0.95); color: #fff;
    padding: 7px 16px; border-radius: 20px; font-size: 12px;
    opacity: 0; transition: opacity 0.3s, transform 0.3s;
    pointer-events: none; z-index: 100; white-space: nowrap; border: 1px solid #333;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #mode-badge {
    position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.65); border: 1px solid #2a2a2a;
    border-radius: 12px; padding: 3px 10px; font-size: 10px; color: #777;
    pointer-events: none; z-index: 10; white-space: nowrap;
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>🏀 作戦盤</h1>
    <div class="header-btns">
      <button class="hbtn" id="undoBtn">↩ 戻す</button>
      <button class="hbtn danger" id="clearBtn">🗑 全消去</button>
    </div>
  </div>

  <div id="court-wrap">
    <canvas id="court-canvas"></canvas>
    <div id="mode-badge">選手を移動</div>
    <div id="toast"></div>
  </div>

  <div id="arrow-options" style="display:none">
    <span class="arrow-label">色:</span>
    <div class="color-dot selected" style="background:#fff" data-color="#ffffff"></div>
    <div class="color-dot" style="background:#facc15" data-color="#facc15"></div>
    <div class="color-dot" style="background:#3b82f6" data-color="#3b82f6"></div>
    <div class="color-dot" style="background:#ef4444" data-color="#ef4444"></div>
    <div class="color-dot" style="background:#22c55e" data-color="#22c55e"></div>
    <div class="color-dot" style="background:#f97316" data-color="#f97316"></div>
    <span class="arrow-label" style="margin-left:6px">太さ:</span>
    <div class="width-btn" style="width:20px;height:20px" data-width="2" id="w-thin">細</div>
    <div class="width-btn selected" style="width:24px;height:24px" data-width="4" id="w-med">中</div>
    <div class="width-btn" style="width:28px;height:28px" data-width="7" id="w-thick">太</div>
  </div>

  <div id="toolbar">
    <div class="tool-section">
      <div class="tbtn active" id="tool-move" data-tool="move">✋<span class="label">移動</span></div>
    </div>
    <div class="tool-divider"></div>
    <div class="tool-section">
      <div class="tbtn team-a" id="add-a">
        <div class="marker-preview" style="background:var(--team-a)">A</div>
        <span class="label">攻撃</span>
      </div>
      <div class="tbtn team-b" id="add-b">
        <div class="marker-preview" style="background:var(--team-b)">D</div>
        <span class="label">守備</span>
      </div>
      <div class="tbtn ball-btn" id="add-ball">🏀<span class="label">ボール</span></div>
    </div>
    <div class="tool-divider"></div>
    <div class="tool-section">
      <div class="tbtn" id="tool-arrow" data-tool="arrow">➡️<span class="label">矢印</span></div>
      <div class="tbtn" id="tool-dash" data-tool="dash">➡<span class="label">点線</span></div>
      <div class="tbtn" id="tool-draw" data-tool="draw">✏️<span class="label">描画</span></div>
    </div>
    <div class="tool-divider"></div>
    <div class="tool-section">
      <div class="tbtn" id="tool-erase" data-tool="erase">🧹<span class="label">消去</span></div>
      <div class="tbtn" id="toggle-court">⛳<span class="label">切替</span></div>
    </div>
  </div>
</div>

<script>
// ================================================================
// BASKETBALL TACTICS BOARD — VERTICAL / PORTRAIT COURT
//
// Logical coordinate system (metres):
//   X : 0 → C_W   = 15  (court width, left→right)
//   Y : 0 → C_H   = 14  (half court) or 28 (full court), top→bottom
//
// Basket at Y ≈ 1.575 (top end, half-court).
// For full court: second basket at Y ≈ 26.425 (bottom).
// ================================================================

const canvas    = document.getElementById('court-canvas');
const ctx       = canvas.getContext('2d');
const wrap      = document.getElementById('court-wrap');
const modeBadge = document.getElementById('mode-badge');

const C_W      = 15;   // court width  (metres)
const C_H_HALF = 14;   // half-court length
const C_H_FULL = 28;   // full-court length

let courtMode   = 'half';
let currentTool = 'move';
let arrowColor  = '#ffffff';
let arrowWidth  = 4;
let markers     = [];
let drawings    = [];
let history     = [];

let isDrawing   = false;
let drawStart   = null;
let drawLive    = null;
let currentPath = [];
let dragMarker  = null;
let dragOffset  = { x: 0, y: 0 };
let scale       = 1;
let offsetX     = 0;
let offsetY     = 0;
let nextId      = 1;

function courtH() { return courtMode === 'half' ? C_H_HALF : C_H_FULL; }
function toCanvas(lx, ly)  { return { x: offsetX + lx * scale, y: offsetY + ly * scale }; }
function toLogical(cx, cy) { return { x: (cx - offsetX) / scale, y: (cy - offsetY) / scale }; }

// ---- Resize / scale ----
function resize() {
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  canvas.width  = w;
  canvas.height = h;
  scale   = Math.min(w / C_W, h / courtH());
  offsetX = (w - C_W      * scale) / 2;
  offsetY = (h - courtH() * scale) / 2;
  render();
}

// ================================================================
// COURT DRAWING
// ================================================================
function drawCourt() {
  const s  = scale;
  const pW = C_W * s;
  const pH = courtH() * s;

  ctx.save();
  ctx.translate(offsetX, offsetY);

  // Wood background
  const grad = ctx.createLinearGradient(0, 0, pW, 0);
  grad.addColorStop(0,   '#bf7008');
  grad.addColorStop(0.25,'#cf8010');
  grad.addColorStop(0.5, '#d98c14');
  grad.addColorStop(0.75,'#cf8010');
  grad.addColorStop(1,   '#bf7008');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, pW, pH);

  // Horizontal wood grain
  ctx.strokeStyle = 'rgba(0,0,0,0.07)';
  ctx.lineWidth = 1;
  for (let y = 0; y < pH; y += 10) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(pW, y); ctx.stroke();
  }

  // Court outline
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.lineWidth = 2.5;
  ctx.strokeRect(2, 2, pW - 4, pH - 4);

  // Full court extras
  if (courtMode === 'full') {
    ctx.beginPath();
    ctx.moveTo(2, pH / 2); ctx.lineTo(pW - 2, pH / 2); ctx.stroke();

    ctx.beginPath();
    ctx.arc(pW / 2, pH / 2, 1.8 * s, 0, Math.PI * 2); ctx.stroke();

    ctx.beginPath();
    ctx.arc(pW / 2, pH / 2, 0.3 * s, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.fill();
  }

  // Basket ends
  drawBasketEnd(pW, s, false); // top (Y=0 side)
  if (courtMode === 'full') {
    ctx.save();
    ctx.translate(pW, pH); ctx.rotate(Math.PI);
    drawBasketEnd(pW, s, false);
    ctx.restore();
  }

  ctx.restore();
}

/**
 * Draw basket end assuming endline is at Y=0, basket opens downward.
 * pW = pixel court width, s = scale
 */
function drawBasketEnd(pW, s) {
  const midX = pW / 2;

  // ---- 3-second key ----
  const keyW = 4.9 * s;
  const keyH = 5.8 * s;
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 2;
  ctx.strokeRect(midX - keyW / 2, 0, keyW, keyH);

  // ---- Free-throw circle (solid half inside key, dashed outside) ----
  const ftY = keyH;
  ctx.beginPath();
  ctx.arc(midX, ftY, 1.8 * s, Math.PI, 0, false); // upper half (toward basket)
  ctx.stroke();
  ctx.setLineDash([8, 8]);
  ctx.beginPath();
  ctx.arc(midX, ftY, 1.8 * s, 0, Math.PI, false); // lower half
  ctx.stroke();
  ctx.setLineDash([]);

  // ---- Backboard ----
  const bbY = 0.4 * s;
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(midX - 0.9 * s, bbY);
  ctx.lineTo(midX + 0.9 * s, bbY);
  ctx.stroke();

  // ---- Basket ring ----
  const ringY = 1.575 * s;
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#ff8c00';
  ctx.beginPath();
  ctx.arc(midX, ringY, 0.225 * s, 0, Math.PI * 2); ctx.stroke();

  // ---- Restricted area arc ----
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(midX, ringY, 1.25 * s, 0, Math.PI, false); // semicircle below ring
  ctx.stroke();

  // ---- 3-point line ----
  // Corner lines: 0.9 m from each sideline, from endline down to where arc begins
  const threeR  = 6.75 * s;
  const cxL     = 0.9 * s;
  const cxR     = pW - 0.9 * s;
  // Y where arc meets the corner line (Pythagoras from ring center)
  const dy_corner = Math.sqrt(Math.max(0, threeR * threeR - (midX - cxL) ** 2));
  const cornerY   = ringY + dy_corner;

  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 2;

  // Left corner straight
  ctx.beginPath(); ctx.moveTo(cxL, 0); ctx.lineTo(cxL, cornerY); ctx.stroke();
  // Right corner straight
  ctx.beginPath(); ctx.moveTo(cxR, 0); ctx.lineTo(cxR, cornerY); ctx.stroke();

  // Arc from left corner to right corner, bulging away from endline (downward)
  const angL = Math.atan2(cornerY - ringY, cxL - midX);
  const angR = Math.atan2(cornerY - ringY, cxR - midX);
  ctx.beginPath();
  ctx.arc(midX, ringY, threeR, angL, angR, true);
  ctx.stroke();
}

// ================================================================
// MARKERS
// ================================================================
function drawMarker(m) {
  const c = toCanvas(m.x, m.y);
  const r = 15;
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 6; ctx.shadowOffsetY = 2;

  if (m.type === 'ball') {
    ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
    const g = ctx.createRadialGradient(c.x-4, c.y-4, 2, c.x, c.y, r);
    g.addColorStop(0, '#ffb347'); g.addColorStop(1, '#e05a00');
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(c.x - r, c.y); ctx.lineTo(c.x + r, c.y); ctx.stroke();
    ctx.beginPath(); ctx.arc(c.x, c.y, r*0.6, -0.45, Math.PI+0.45); ctx.stroke();
    ctx.beginPath(); ctx.arc(c.x, c.y, r*0.6, Math.PI-0.45, Math.PI*2-0.45); ctx.stroke();
  } else {
    const color = m.team === 'a' ? '#3b82f6' : '#ef4444';
    const ring  = m.team === 'a' ? '#93c5fd' : '#fca5a5';
    ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
    const g = ctx.createRadialGradient(c.x-3, c.y-3, 2, c.x, c.y, r);
    g.addColorStop(0, ring); g.addColorStop(1, color);
    ctx.fillStyle = g; ctx.fill();
    ctx.shadowBlur = 0; ctx.fillStyle = '#fff';
    ctx.font = `bold 12px 'Bebas Neue', sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(m.num, c.x, c.y + 1);
  }

  if (m === dragMarker) {
    ctx.strokeStyle = '#facc15'; ctx.lineWidth = 2.5;
    ctx.shadowColor = '#facc15'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(c.x, c.y, r + 3, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.restore();
}

// ================================================================
// ARROWS / FREEHAND
// ================================================================
function drawArrow(x1, y1, x2, y2, color, width, dashed) {
  const dx = x2 - x1, dy = y2 - y1;
  if (Math.hypot(dx, dy) < 5) return;
  const headLen = Math.max(10, width * 4);
  const angle   = Math.atan2(dy, dx);
  ctx.save();
  ctx.strokeStyle = color; ctx.fillStyle = color;
  ctx.lineWidth = width; ctx.lineCap = 'round';
  ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 3;
  if (dashed) ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2 - Math.cos(angle)*headLen*0.6, y2 - Math.sin(angle)*headLen*0.6);
  ctx.stroke(); ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - headLen*Math.cos(angle-0.4), y2 - headLen*Math.sin(angle-0.4));
  ctx.lineTo(x2 - headLen*0.5*Math.cos(angle), y2 - headLen*0.5*Math.sin(angle));
  ctx.lineTo(x2 - headLen*Math.cos(angle+0.4), y2 - headLen*Math.sin(angle+0.4));
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawFreehand(points, color, width) {
  if (points.length < 2) return;
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = width;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 2;
  ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) {
    const mx = (points[i-1].x + points[i].x) / 2;
    const my = (points[i-1].y + points[i].y) / 2;
    ctx.quadraticCurveTo(points[i-1].x, points[i-1].y, mx, my);
  }
  ctx.stroke(); ctx.restore();
}

// ================================================================
// RENDER
// ================================================================
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawCourt();

  for (const d of drawings) {
    if (d.type === 'arrow' || d.type === 'dash')
      drawArrow(d.p0.x, d.p0.y, d.p1.x, d.p1.y, d.color, d.width, d.type === 'dash');
    else
      drawFreehand(d.points, d.color, d.width);
  }

  if (isDrawing && drawStart && (currentTool === 'arrow' || currentTool === 'dash') && drawLive) {
    const c0 = toCanvas(drawStart.x, drawStart.y);
    drawArrow(c0.x, c0.y, drawLive.x, drawLive.y, arrowColor, arrowWidth, currentTool === 'dash');
  }
  if (isDrawing && currentTool === 'draw' && currentPath.length > 1)
    drawFreehand(currentPath, arrowColor, arrowWidth);

  for (const m of markers) drawMarker(m);
}

// ================================================================
// INPUT
// ================================================================
function getPos(e) {
  const rect  = canvas.getBoundingClientRect();
  const touch = e.touches ? (e.touches[0] || e.changedTouches[0]) : e;
  return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

function hitMarker(cx, cy) {
  for (let i = markers.length - 1; i >= 0; i--) {
    const c = toCanvas(markers[i].x, markers[i].y);
    if (Math.hypot(cx - c.x, cy - c.y) < 22) return markers[i];
  }
  return null;
}

function onDown(e) {
  e.preventDefault();
  const pos = getPos(e), lp = toLogical(pos.x, pos.y);
  if (currentTool === 'move') {
    const hit = hitMarker(pos.x, pos.y);
    if (hit) { pushHistory(); dragMarker = hit; dragOffset = { x: lp.x - hit.x, y: lp.y - hit.y }; }
  } else if (currentTool === 'erase') {
    const hit = hitMarker(pos.x, pos.y);
    if (hit) { pushHistory(); markers = markers.filter(m => m !== hit); render(); }
    else eraseNearestDrawing(pos.x, pos.y);
  } else if (currentTool === 'arrow' || currentTool === 'dash') {
    isDrawing = true; drawStart = lp; drawLive = pos;
  } else if (currentTool === 'draw') {
    isDrawing = true; currentPath = [pos];
  }
}

function onMove(e) {
  e.preventDefault();
  const pos = getPos(e), lp = toLogical(pos.x, pos.y);
  if (dragMarker) {
    dragMarker.x = lp.x - dragOffset.x;
    dragMarker.y = lp.y - dragOffset.y;
    render();
  } else if (isDrawing) {
    if (currentTool === 'arrow' || currentTool === 'dash') { drawLive = pos; render(); }
    else if (currentTool === 'draw') { currentPath.push(pos); render(); }
  }
}

function onUp(e) {
  e.preventDefault();
  const pos = getPos(e);
  if (dragMarker) { dragMarker = null; render(); return; }
  if (!isDrawing) return;
  if (currentTool === 'arrow' || currentTool === 'dash') {
    const c0   = toCanvas(drawStart.x, drawStart.y);
    const dist = Math.hypot(pos.x - c0.x, pos.y - c0.y);
    if (dist > 15) {
      pushHistory();
      drawings.push({ type: currentTool, p0: c0, p1: pos, color: arrowColor, width: arrowWidth });
    }
  } else if (currentTool === 'draw' && currentPath.length > 3) {
    pushHistory();
    drawings.push({ type: 'draw', points: [...currentPath], color: arrowColor, width: arrowWidth });
  }
  isDrawing = false; drawStart = null; drawLive = null; currentPath = [];
  render();
}

function eraseNearestDrawing(cx, cy) {
  let minDist = 25, target = null;
  for (const d of drawings) {
    if (d.type === 'arrow' || d.type === 'dash') {
      const dist = distToSeg({ x:cx, y:cy }, d.p0, d.p1);
      if (dist < minDist) { minDist = dist; target = d; }
    } else {
      for (const pt of d.points) {
        const dist = Math.hypot(cx - pt.x, cy - pt.y);
        if (dist < minDist) { minDist = dist; target = d; }
      }
    }
  }
  if (target) { pushHistory(); drawings = drawings.filter(d => d !== target); render(); }
}

function distToSeg(p, a, b) {
  const dx = b.x-a.x, dy = b.y-a.y;
  const t  = Math.max(0, Math.min(1, ((p.x-a.x)*dx+(p.y-a.y)*dy)/(dx*dx+dy*dy+1e-9)));
  return Math.hypot(p.x-(a.x+t*dx), p.y-(a.y+t*dy));
}

canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove',  onMove, { passive: false });
canvas.addEventListener('touchend',   onUp,   { passive: false });
canvas.addEventListener('mousedown',  onDown);
canvas.addEventListener('mousemove',  onMove);
canvas.addEventListener('mouseup',    onUp);

// ================================================================
// HISTORY
// ================================================================
function pushHistory() {
  history.push({ markers: JSON.parse(JSON.stringify(markers)), drawings: JSON.parse(JSON.stringify(drawings)) });
  if (history.length > 50) history.shift();
}
function undo() {
  if (!history.length) { showToast('これ以上戻せません'); return; }
  const s = history.pop(); markers = s.markers; drawings = s.drawings; render();
  showToast('元に戻しました');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ================================================================
// TOOL SELECT
// ================================================================
function selectTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tbtn[data-tool]').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.tbtn[data-tool="${tool}"]`);
  if (btn) btn.classList.add('active');
  const drawTools = tool === 'arrow' || tool === 'dash' || tool === 'draw';
  document.getElementById('arrow-options').style.display = drawTools ? 'flex' : 'none';
  const labels = { move:'選手を移動', arrow:'矢印を描く', dash:'点線を描く', draw:'フリー描画', erase:'要素を消去' };
  modeBadge.textContent = labels[tool] || '';
}
document.querySelectorAll('.tbtn[data-tool]').forEach(btn => {
  btn.addEventListener('click', () => selectTool(btn.dataset.tool));
});

// ================================================================
// ADD MARKERS
// ================================================================
function countByTeam(team) { return markers.filter(m => m.team === team).length; }

document.getElementById('add-a').addEventListener('click', () => {
  const n = countByTeam('a') + 1;
  if (n > 7) { showToast('これ以上追加できません'); return; }
  pushHistory();
  const x = 1.5 + Math.random() * (C_W - 3);
  const y = C_H_HALF * 0.5 + Math.random() * (C_H_HALF * 0.45);
  markers.push({ id: nextId++, type: 'player', team: 'a', num: n, x, y });
  render(); showToast(`攻撃 ${n} を追加`);
});

document.getElementById('add-b').addEventListener('click', () => {
  const n = countByTeam('b') + 1;
  if (n > 7) { showToast('これ以上追加できません'); return; }
  pushHistory();
  const x = 1.5 + Math.random() * (C_W - 3);
  const y = C_H_HALF * 0.28 + Math.random() * (C_H_HALF * 0.3);
  markers.push({ id: nextId++, type: 'player', team: 'b', num: n, x, y });
  render(); showToast(`守備 ${n} を追加`);
});

document.getElementById('add-ball').addEventListener('click', () => {
  if (markers.find(m => m.type === 'ball')) { showToast('ボールは1つだけです'); return; }
  pushHistory();
  markers.push({ id: nextId++, type: 'ball', x: C_W / 2, y: C_H_HALF * 0.6 });
  render(); showToast('ボールを追加');
});

document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('clearBtn').addEventListener('click', () => {
  if (!markers.length && !drawings.length) return;
  pushHistory(); markers = []; drawings = []; render(); showToast('全て消去しました');
});

// ================================================================
// TOGGLE HALF / FULL COURT
// ================================================================
document.getElementById('toggle-court').addEventListener('click', () => {
  const wasHalf = courtMode === 'half';
  courtMode = wasHalf ? 'full' : 'half';
  const ratio = wasHalf ? C_H_FULL / C_H_HALF : C_H_HALF / C_H_FULL;
  markers.forEach(m => {
    m.y = Math.max(0.5, Math.min(courtH() - 0.5, m.y * ratio));
  });
  drawings = [];
  resize();
  showToast(courtMode === 'half' ? 'ハーフコート' : 'フルコート');
});

// ================================================================
// COLOR / WIDTH PICKERS
// ================================================================
document.querySelectorAll('.color-dot[data-color]').forEach(dot => {
  dot.addEventListener('click', () => {
    document.querySelectorAll('.color-dot[data-color]').forEach(d => d.classList.remove('selected'));
    dot.classList.add('selected'); arrowColor = dot.dataset.color;
  });
});
document.querySelectorAll('[data-width]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-width]').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected'); arrowWidth = parseInt(btn.dataset.width);
  });
});

// ================================================================
// DEFAULT 5 vs 5 (portrait half-court)
// Basket at TOP (Y≈0). Offense in lower area, defense in upper area.
// X: 0–15 (court width), Y: 0–14 (half-court length top→bottom)
// ================================================================
function initDefault() {
  // Offense (blue) — spread around Y 8–12 (key/3pt area)
  [
    [7.5, 10.5],  // PG (top of key)
    [3.5,  8.5],  // SG left wing
    [11.5, 8.5],  // SF right wing
    [1.5,  6.5],  // PF left corner
    [13.5, 6.5],  // C  right corner
  ].forEach(([x,y], i) => markers.push({ id: nextId++, type:'player', team:'a', num:i+1, x, y }));

  // Defense (red) — spread around Y 4–7 (between key and midcourt)
  [
    [7.5,  8.0],
    [3.5,  6.5],
    [11.5, 6.5],
    [2.0,  4.5],
    [13.0, 4.5],
  ].forEach(([x,y], i) => markers.push({ id: nextId++, type:'player', team:'b', num:i+1, x, y }));

  // Ball with PG
  markers.push({ id: nextId++, type:'ball', x:7.5, y:11.0 });
}

initDefault();
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 150));

// ---- Service Worker registration ----
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
